services:
  - type: web
    name: groww-rag-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
        required: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
